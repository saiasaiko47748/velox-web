<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELOX Pro — Live Tracking</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    :root { --gold:#C9A84C; --gold-light:#E8D5A3; --bg:#0A0A0A; --card:#1A1A1A; --border:#2A2A2A; --text:#fff; --muted:#A0A0A0; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; }
    .pro-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:24px; padding:40px 32px; width:100%; max-width:420px;
      text-align:center;
    }
    .logo { font-family:'DM Sans',sans-serif; color:var(--gold); font-size:28px; font-weight:700; letter-spacing:5px; margin-bottom:6px; }
    .pro-badge {
      display:inline-block; background:rgba(201,168,76,0.1); border:1px solid rgba(201,168,76,0.3);
      color:var(--gold); border-radius:999px; padding:4px 14px; font-size:11px; font-weight:700;
      text-transform:uppercase; letter-spacing:2px; margin-bottom:28px;
    }
    .booking-ref { color:var(--muted); font-size:13px; margin-bottom:6px; }
    .booking-ref strong { color:var(--gold); font-family:monospace; font-size:18px; }
    .service-name { color:var(--text); font-size:18px; font-weight:700; margin-bottom:4px; }
    .customer-info { color:var(--muted); font-size:13px; margin-bottom:28px; }
    .status-display {
      background:var(--bg); border:1px solid var(--border);
      border-radius:14px; padding:16px; margin-bottom:24px;
      display:flex; align-items:center; gap:12px;
    }
    .status-dot { width:10px; height:10px; border-radius:50%; background:var(--muted); }
    .status-dot.green { background:#22c55e; animation:blink 1s infinite; }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .status-text { font-size:14px; color:var(--muted); text-align:left; }
    .status-text strong { display:block; color:var(--text); font-size:15px; }
    .coords { font-family:monospace; font-size:12px; color:var(--gold-light); margin-top:2px; }

    .btn-start {
      width:100%; background:var(--gold); color:#0A0A0A;
      border:none; border-radius:14px; padding:16px;
      font-family:'DM Sans'; font-size:16px; font-weight:700;
      cursor:pointer; transition:all .3s; margin-bottom:12px;
      display:flex; align-items:center; justify-content:center; gap:10px;
    }
    .btn-start:hover { background:var(--gold-light); }
    .btn-start:disabled { opacity:.5; cursor:not-allowed; }
    .btn-stop {
      width:100%; background:transparent; border:1px solid #ef4444;
      color:#ef4444; border-radius:14px; padding:14px;
      font-family:'DM Sans'; font-size:15px; font-weight:700;
      cursor:pointer; transition:all .3s; display:none;
      align-items:center; justify-content:center; gap:8px;
    }
    .btn-stop.visible { display:flex; }
    .btn-stop:hover { background:rgba(239,68,68,.1); }
    .pro-name-form { margin-bottom:24px; }
    .pro-name-form input {
      width:100%; background:var(--bg); border:1px solid var(--border);
      border-radius:12px; padding:12px 14px; color:var(--text);
      font-family:'DM Sans'; font-size:14px; outline:none;
      transition:border-color .3s; margin-bottom:6px;
    }
    .pro-name-form input:focus { border-color:var(--gold); }
    .pro-name-form label { display:block; color:var(--muted); font-size:12px; margin-bottom:8px; text-align:left; text-transform:uppercase; letter-spacing:1px; }
    .pulse-ring {
      width:80px; height:80px; border-radius:50%;
      background:rgba(201,168,76,0.1); border:2px solid var(--gold);
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 24px; font-size:30px; color:var(--gold);
      position:relative;
    }
    .pulse-ring::before {
      content:''; position:absolute; inset:-8px;
      border:2px solid rgba(201,168,76,0.3); border-radius:50%;
      animation:ripple2 2s infinite;
    }
    @keyframes ripple2{0%{transform:scale(1);opacity:1}100%{transform:scale(1.4);opacity:0}}
    .status-updates { margin-top:20px; }
    .status-update-btn {
      background:var(--bg); border:1px solid var(--border);
      color:var(--muted); border-radius:10px; padding:10px 16px;
      font-size:13px; cursor:pointer; transition:all .3s; margin:4px;
    }
    .status-update-btn:hover { border-color:var(--gold); color:var(--gold); }
    .status-update-btn.active { border-color:#22c55e; color:#22c55e; background:rgba(34,197,94,.08); }
    .divider { border:none; border-top:1px solid var(--border); margin:20px 0; }
  </style>
</head>
<body>
  <div class="pro-card">
    <div class="logo">VELOX</div>
    <div class="pro-badge"><i class="fa-solid fa-id-badge"></i> Professional Mode</div>

    <div class="pulse-ring"><i class="fa-solid fa-location-dot"></i></div>

    <div class="booking-ref">Booking: <strong>{{ booking.booking_ref }}</strong></div>
    <div class="service-name">{{ booking.service }}</div>
    <div class="customer-info">
      Customer: {{ booking.name }}<br>
      <span style="font-size:12px;">{{ booking.scheduled_dt or '' }}</span>
    </div>

    <!-- Pro Name -->
    <div class="pro-name-form">
      <label>Your Name (shown to customer)</label>
      <input type="text" id="proName" placeholder="e.g. Rajesh Kumar" value="{{ booking.pro_name or '' }}">
    </div>

    <!-- Status display -->
    <div class="status-display">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text">
        <strong id="statusLabel">Ready to Start</strong>
        <span class="coords" id="coordsDisplay">Location not shared yet</span>
      </div>
    </div>

    <!-- Start button -->
    <button class="btn-start" id="startBtn" onclick="startSharing()">
      <i class="fa-solid fa-play"></i> Start Location Sharing
    </button>

    <!-- Stop button -->
    <button class="btn-stop" id="stopBtn" onclick="stopSharing()">
      <i class="fa-solid fa-stop"></i> Stop Sharing
    </button>

    <!-- Update order status -->
    <div class="divider"></div>
    <div style="color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;text-align:left;">Update Order Status</div>
    <div class="status-updates">
      <button class="status-update-btn" onclick="updateStatus('en_route')">🚗 En Route</button>
      <button class="status-update-btn" onclick="updateStatus('in_progress')">🔧 In Progress</button>
      <button class="status-update-btn" onclick="updateStatus('completed')">✅ Completed</button>
    </div>
  </div>

  <script>
    const socket = io();
    const bookingRef = "{{ booking.booking_ref }}";
    let watchId = null;
    let sharing = false;

    function startSharing() {
      if (!navigator.geolocation) {
        alert('Geolocation is not supported on this device.'); return;
      }
      const proName = document.getElementById('proName').value.trim() || 'Your Professional';

      // Save pro name to backend
      fetch('/api/update-booking-status', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ booking_ref: bookingRef, status: 'en_route', pro_name: proName })
      });

      document.getElementById('startBtn').disabled = true;
      document.getElementById('startBtn').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Acquiring GPS...';

      watchId = navigator.geolocation.watchPosition(
        (pos) => {
          const coords = {
            booking_ref: bookingRef,
            lat: pos.coords.latitude,
            lng: pos.coords.longitude,
            accuracy: pos.coords.accuracy,
            timestamp: Date.now()
          };
          socket.emit('update_location', coords);
          document.getElementById('statusDot').className = 'status-dot green';
          document.getElementById('statusLabel').textContent = '📡 Sharing Live Location';
          document.getElementById('coordsDisplay').textContent =
            `${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;
          document.getElementById('startBtn').style.display = 'none';
          document.getElementById('stopBtn').className = 'btn-stop visible';
          sharing = true;
        },
        (err) => {
          console.error(err);
          alert('GPS Error: ' + err.message);
          document.getElementById('startBtn').disabled = false;
          document.getElementById('startBtn').innerHTML = '<i class="fa-solid fa-play"></i> Start Location Sharing';
        },
        { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
      );
    }

    function stopSharing() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      sharing = false;
      document.getElementById('statusDot').className = 'status-dot';
      document.getElementById('statusLabel').textContent = 'Location sharing stopped';
      document.getElementById('coordsDisplay').textContent = '';
      document.getElementById('stopBtn').className = 'btn-stop';
      document.getElementById('startBtn').style.display = 'flex';
      document.getElementById('startBtn').disabled = false;
      document.getElementById('startBtn').innerHTML = '<i class="fa-solid fa-play"></i> Start Location Sharing';
    }

    function updateStatus(status) {
      const proName = document.getElementById('proName').value.trim();
      fetch('/api/update-booking-status', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ booking_ref: bookingRef, status, pro_name: proName })
      }).then(r => r.json()).then(d => {
        if (d.success) {
          document.querySelectorAll('.status-update-btn').forEach(b => b.classList.remove('active'));
          event.target.classList.add('active');
          const labels = { en_route:'🚗 En Route', in_progress:'🔧 In Progress', completed:'✅ Completed' };
          document.getElementById('statusLabel').textContent = labels[status] || status;
        }
      });
    }
  </script>
</body>
</html>
